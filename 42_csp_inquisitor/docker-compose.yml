services:
  ftp-server:
    build: .
    container_name: ftp-server
    hostname: ftp-server
    environment:
      - CONTAINER_ROLE=ftp-server
      - FTP_PASSWORD=testpass
    networks:
      ftp_net:
        ipv4_address: 172.28.0.10
    volumes:
      - ./ftp_data:/home/vsftpd/ftpuser
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"

  ftp-client:
    build: .
    container_name: ftp-client
    hostname: ftp-client
    environment:
      - CONTAINER_ROLE=ftp-client
    networks:
      ftp_net:
        ipv4_address: 172.28.0.11
    volumes:
      - ./client_files:/shared

  attacker:
    build: .
    container_name: attacker
    hostname: attacker
    environment:
      - CONTAINER_ROLE=attacker
    networks:
      ftp_net:
        ipv4_address: 172.28.0.12
    privileged: true
    cap_add:
      - NET_RAW
      - NET_ADMIN

networks:
  ftp_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24